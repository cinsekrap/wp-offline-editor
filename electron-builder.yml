appId: com.wp-offline-editor.app
productName: Offline Post Editor
directories:
  buildResources: resources
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
extraResources:
  - from: resources/wp-offline-editor-companion.zip
    to: wp-offline-editor-companion.zip
publish:
  provider: github
  owner: cinsekrap
  repo: wp-offline-editor
mac:
  extendInfo:
    - NSDocumentsFolderUsageDescription: Application needs access to store offline content.
  notarize: false
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
